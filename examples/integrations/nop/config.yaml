receivers:
  nop:

extensions:
  solarwinds:
    collector_name: # Required parameter
    grpc: &grpc_settings
      endpoint: # Required parameter
      tls:
        insecure: false
      headers: {"Authorization": "Bearer ${env:SOLARWINDS_TOKEN}", "swi-reporter": "otel solarwinds-otel-collector"}

exporters:
  otlp_grpc:
    <<: *grpc_settings

service:
  extensions:
    - solarwinds
  telemetry:
    metrics:
      # Disable the default metrics endpoint (port 8888) to avoid port conflicts
      # when running multiple collectors on the same host.
      level: none
  pipelines:
    metrics:
      receivers:
        - nop
      exporters:
        - otlp_grpc
